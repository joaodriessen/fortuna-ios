name: Fortuna
options:
  bundleIdPrefix: com.joaodriessen
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    ENABLE_PREVIEWS: "YES"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Fortuna:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Fortuna
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joaodriessen.fortuna
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Fortuna
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    scheme:
      testTargets:
        - FortunaTests
  FortunaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FortunaTests
    dependencies:
      - target: Fortuna
